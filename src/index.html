<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minhas Tarefas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>

  <main class="pagina">
    <section class="cartao">

      <header class="cabecalho">
        <h1>Minhas Tarefas</h1>
        <p class="subtitulo">Organize suas tarefas aqui!</p>

        <div class="progresso" id="progress-area">
          <div class="progresso-legenda">
            <span id="progress-text">0 de 0 concluídas</span>
            <span id="progress-pct">0%</span>
          </div>
          <div class="progresso-trilha">
            <div class="progresso-barra" id="progress-bar"></div>
          </div>
        </div>
      </header>

      <div id="app">

        <div class="area-input">
          <input
            type="text"
            placeholder="Nova tarefa..."
            aria-label="Digite uma tarefa"
            id="task-input"
            autocomplete="off"
          />
          <button type="button" id="add-button" aria-label="Adicionar tarefa">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Adicionar
          </button>
        </div>

        <p class="retorno" id="feedback" role="alert" aria-live="polite"></p>

        <div class="barra-filtros" role="group" aria-label="Filtrar tarefas">
          <button class="btn-filtro ativo" data-filter="all">Todas</button>
          <button class="btn-filtro" data-filter="pending">Pendentes</button>
          <button class="btn-filtro" data-filter="done">Concluídas</button>
        </div>

        <ul id="lista-tarefas" aria-label="Lista de tarefas"></ul>

      </div>
    </section>
  </main>

  <footer class="rodape">
    <p>Desenvolvido por <strong>Isadora Franco</strong></p>
  </footer>

  <script src="../build/index.js"></script>
</body>
</html>
